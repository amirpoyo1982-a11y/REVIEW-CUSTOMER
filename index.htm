<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified Reviews — H4SX STORE</title>
  <style>
    /* Estetik Deep Cyberpunk / Dark Mode */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 40px 20px;
      background-color: #080c14; 
      color: #f1f5f9; 
    }
    .main-container {
      max-width: 550px;
      margin: 0 auto;
      background-color: #0f172a;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #1e293b;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(14, 165, 233, 0.05);
    }
    h2 {
      color: #38bdf8;
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 22px;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 12px;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }

    /* Kotak Ringkasan Rating Utama */
    .rating-summary {
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      border: 1px dashed #334155;
    }
    .big-score {
      font-size: 36px;
      font-weight: 800;
      color: #38bdf8;
      margin-right: 15px;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }
    .stats-info h4 { margin: 0; color: #f1f5f9; font-size: 15px; }
    .stats-info p { margin: 2px 0 0 0; color: #64748b; font-size: 12px; }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    input[type="text"], select, textarea { 
      width: 100%;
      padding: 12px; 
      border-radius: 10px; 
      border: 1px solid #334155; 
      background-color: #1e293b; 
      color: #fff; 
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }
    
    /* Highlight khas untuk input KOD */
    .code-input {
      border: 1px dashed #f59e0b !important;
      background-color: #1e1b12 !important;
      color: #f59e0b !important;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .code-input:focus {
      border-color: #f59e0b !important;
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.2) !important;
    }

    textarea { resize: vertical; }
    
    /* Butang Impak Neon */
    button { 
      width: 100%;
      padding: 14px; 
      border-radius: 10px; 
      background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
      color: #fff; 
      font-size: 15px;
      font-weight: bold; 
      cursor: pointer; 
      border: none; 
      transition: all 0.2s;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button:hover { 
      background: linear-gradient(90deg, #0ea5e9 0%, #0284c7 100%);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }
    button:active { transform: scale(0.98); }

    .rating-box { 
      border: 1px solid #1e293b; 
      padding: 5px; 
      margin-top: 15px; 
      background-color: #090c14; 
      border-radius: 14px; 
      max-height: 450px;
      overflow-y: auto;
    }

    /* Kad Struktur Komen Ber-Avatar */
    .review-card { 
      padding: 16px; 
      border-bottom: 1px solid #1e293b; 
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn 0.4s ease-in-out;
    }
    .review-card:last-child { border-bottom: none; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 38px;
      height: 38px;
      color: #0f172a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(256, 256, 256, 0.05);
    }
    .review-content {
      flex-grow: 1;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* GAYA REKABENTUK NAMA + BADGE VERIFIED */
    .buyer-name-container {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .buyer-name { 
      font-weight: bold; 
      color: #f8fafc;
      font-size: 14px;
    }
    .verified-badge {
      background-color: rgba(16, 185, 129, 0.1);
      color: #10b981;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
    }

    .buyer-stars { font-size: 11px; letter-spacing: 1px; }
    .buyer-time {
      font-size: 11px;
      color: #475569;
      margin-bottom: 5px;
    }
    .buyer-feedback { 
      color: #cbd5e1;
      font-size: 13.5px;
      line-height: 1.5;
      margin: 0;
      word-break: break-word;
    }
    .no-reviews {
      text-align: center;
      color: #475569;
      font-size: 13px;
      padding: 30px 0;
    }
    h3 {
      color: #64748b;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 30px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="main-container">
    <h2>Beri Penarafan Anda</h2>
    
    <div class="rating-summary">
      <div class="big-score" id="purataSkor">0.0</div>
      <div class="stats-info">
        <h4>Purata Kepuasan Pelanggan</h4>
        <p id="jumlahUlasan">Memuatkan statistik ulasan...</p>
      </div>
    </div>
    
    <div class="form-group">
      <label for="kodVerification" style="color: #f59e0b;">🔐 Kod Pengesahan Pembelian (Dapatkan dari Admin):</label>
      <input type="text" id="kodVerification" class="code-input" placeholder="TAIP KOD DI SINI" style="text-transform: uppercase;">
    </div>

    <div class="form-group">
      <label for="namaPelanggan">Nama / Username Pembeli:</label>
      <input type="text" id="namaPelanggan" placeholder="Contoh: Hasnain Gaming">
    </div>

    <div class="form-group">
      <label for="pilihBintang">Skor Perkhidmatan:</label>
      <select id="pilihBintang">
        <option value="5">⭐⭐⭐⭐⭐ (5 Bintang — Sangat Puas)</option>
        <option value="4">⭐⭐⭐⭐ (4 Bintang — Baik)</option>
        <option value="3">⭐⭐⭐ (3 Bintang — Sederhana)</option>
        <option value="2">⭐⭐ (2 Bintang — Kurang Memuaskan)</option>
        <option value="1">⭐ (1 Bintang — Lemah)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="ulasanPelanggan">Ulasan Telus:</label>
      <textarea id="ulasanPelanggan" rows="3" placeholder="Kongsi pengalaman anda berurusan dengan H4SX STORE..."></textarea>
    </div>

    <button id="butangHantar">Hantar Review</button>

    <h3>Ulasan Pelanggan Terkini (Real-Time):</h3>
    <div id="kotakPaparan" class="rating-box">Memuatkan maklumat ulasan...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOkyPe2f1tHu9OQiwHHpgfJTYM-KM7cuU",
      authDomain: "h4sx-6712c.firebaseapp.com",
      projectId: "h4sx-6712c",
      storageBucket: "h4sx-6712c.firebasestorage.app",
      messagingSenderId: "416803081247",
      appId: "1:416803081247:web:e201174233b953e539992a",
      measurementId: "G-J9QWB39V87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const kodVerification = document.getElementById("kodVerification");
    const namaPelanggan = document.getElementById("namaPelanggan");
    const pilihBintang = document.getElementById("pilihBintang");
    const ulasanPelanggan = document.getElementById("ulasanPelanggan");
    const butangHantar = document.getElementById("butangHantar");
    const kotakPaparan = document.getElementById("kotakPaparan");
    const purataSkor = document.getElementById("purataSkor");
    const jumlahUlasan = document.getElementById("jumlahUlasan");

    const warnaAvatar = ['#38bdf8', '#a855f7', '#ec4899', '#10b981', '#f59e0b', '#ef4444'];

    // 1. Fungsi Simpan Data + Validasi Kod Sekali Guna
    butangHantar.addEventListener("click", async () => {
      const kod = kodVerification.value.trim().toUpperCase();
      const nama = namaPelanggan.value.trim();
      const nilaiBintang = parseInt(pilihBintang.value);
      const ulasan = ulasanPelanggan.value.trim();

      if (!kod || !nama || !ulasan) {
        alert("Sila lengkapkan Kod Pengesahan, Nama, dan Ruangan Ulasan!");
        return;
      }

      try {
        const docRef = doc(db, "review_codes", kod);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          alert("❌ Ralat: Kod pengesahan salah atau tidak sah!");
          return;
        }

        if (docSnap.data().used === true) {
          alert("❌ Ralat: Kod ini telah pun digunakan sebelum ini!");
          return;
        }

        await addDoc(collection(db, "ratings"), {
          nama: nama,
          bintang: nilaiBintang,
          ulasan: ulasan,
          diciptaPada: serverTimestamp()
        });
        
        await updateDoc(docRef, {
          used: true
        });

        kodVerification.value = "";
        namaPelanggan.value = "";
        ulasanPelanggan.value = "";
        alert("🔥 Berjaya! Ulasan anda disahkan dan telah selamat disimpan.");

      } catch (ralat) {
        console.error(ralat);
        alert("Sistem sibuk atau ralat network. Cuba lagi sebentar.");
      }
    });

    // 2. Fungsi Ambil Data & Pengiraan Statistik Live
    const queryRating = query(collection(db, "ratings"), orderBy("diciptaPada", "desc"));
    onSnapshot(queryRating, (snapshot) => {
      kotakPaparan.innerHTML = ""; 
      
      let totalBintang = 0;
      let count = snapshot.size;

      if (snapshot.empty) {
        kotakPaparan.innerHTML = '<div class="no-reviews">Belum ada sebarang maklum balas terkumpul.</div>';
        purataSkor.textContent = "0.0";
        jumlahUlasan.textContent = "Berdasarkan 0 ulasan pembeli";
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        const score = parseInt(data.bintang) || 0;
        totalBintang += score;

        const bintangTeks = "⭐".repeat(score);
        const rawNama = data.nama || "Pelanggan Misteri";
        const paparanUlasan = data.ulasan || "Tiada ulasan teks disediakan.";

        // --- FUNGSI CIPTAAN: KAWALAN PRIVASI SOROK NAMA SETENGAH ---
        let namaDisorok = rawNama;
        if (rawNama !== "Pelanggan Misteri") {
          if (rawNama.length <= 2) {
            namaDisorok = rawNama.charAt(0) + "*";
          } else if (rawNama.length === 3) {
            namaDisorok = rawNama.charAt(0) + "*" + rawNama.charAt(2);
          } else {
            // Contoh: "adat" -> ambil 2 huruf depan ("ad"), tambah '*', dan huruf terakhir ("t") = ad*t
            namaDisorok = rawNama.substring(0, 2) + "*".repeat(rawNama.length - 3) + rawNama.slice(-1);
          }
        }

        const inisial = rawNama.charAt(0).toUpperCase();
        const warnaDipilih = warnaAvatar[rawNama.length % warnaAvatar.length];

        let paparanMasa = "Baru sahaja masuk";
        if (data.diciptaPada) {
          const tarikhObjek = data.diciptaPada.toDate();
          paparanMasa = tarikhObjek.toLocaleString('ms-MY', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
          });
        }

        const card = document.createElement("div");
        card.className = "review-card";
        card.innerHTML = `
          <div class="avatar" style="background-color: ${warnaDipilih}">${inisial}</div>
          <div class="review-content">
            <div class="review-header">
              <div class="buyer-name-container">
                <span class="buyer-name">${namaDisorok}</span>
                <span class="verified-badge">✓ Verified Buyer</span>
              </div>
              <span class="buyer-stars">${bintangTeks}</span>
            </div>
            <div class="buyer-time">${paparanMasa}</div>
            <p class="buyer-feedback">${paparanUlasan}</p>
          </div>
        `;
        
        kotakPaparan.appendChild(card);
      });

      const hasilPurata = (totalBintang / count).toFixed(1);
      purataSkor.textContent = hasilPurata;
      jumlahUlasan.textContent = `Berdasarkan ${count} ulasan pembeli sah`;
    });
  </script>
</body>
</html>
